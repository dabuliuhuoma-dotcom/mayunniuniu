<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>加载中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        body.is-verify {
            background: linear-gradient(165deg, #eef3ff 0%, #f7f9fc 42%, #ffffff 100%);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e8edf5;
            border-top-color: #1456F0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 状态卡片：加载 / 错误 / 成功 */
        .status-card {
            width: 100%;
            max-width: 320px;
            padding: 28px 22px 22px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
            text-align: center;
        }
        .status-card.is-error {
            border-color: #fecaca;
            background: linear-gradient(180deg, #fff 0%, #fffbfb 100%);
        }
        .status-card.is-success {
            border-color: #bbf7d0;
            background: linear-gradient(180deg, #fff 0%, #f0fdf4 100%);
        }
        .status-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon.is-error {
            background: #fef2f2;
            color: #ef4444;
        }
        .status-icon.is-success {
            background: #f0fdf4;
            color: #16a34a;
        }
        .status-icon svg {
            width: 28px;
            height: 28px;
        }
        .title { font-size: 17px; color: #0f172a; margin-bottom: 8px; text-align: center; font-weight: 600; line-height: 1.4; }
        .hint { font-size: 14px; color: #64748b; text-align: center; line-height: 1.6; }
        .status-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #64748b;
            background: #f1f5f9;
        }
        .status-card.is-error .status-badge {
            color: #b91c1c;
            background: #fee2e2;
        }

        /* 验证卡片 */
        .verify-card {
            width: 100%;
            max-width: 360px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.95);
            padding: 22px 18px 18px;
        }
        .verify-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .verify-brand-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(145deg, #1456F0 0%, #5b8cff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 6px 16px rgba(20, 86, 240, 0.28);
        }
        .verify-brand-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }
        .verify-brand-text h2 {
            font-size: 17px;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.3;
        }
        .verify-brand-text p {
            margin-top: 2px;
            font-size: 13px;
            color: #64748b;
        }
        .puzzle-box {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            user-select: none;
            touch-action: none;
        }
        .puzzle-box img {
            display: block;
            width: 100%;
            height: auto;
        }
        .puzzle-bg-overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .puzzle-piece {
            position: absolute;
            left: 0;
            top: 0;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 3px 8px rgba(15, 23, 42, 0.22));
        }
        .puzzle-refresh {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }
        .puzzle-refresh svg {
            width: 16px;
            height: 16px;
            fill: #64748b;
        }
        .slider-panel {
            margin-top: 16px;
        }
        .slider-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            text-align: center;
        }
        .slider-rail {
            position: relative;
            height: 46px;
            border-radius: 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .slider-progress {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: linear-gradient(90deg, rgba(20, 86, 240, 0.12), rgba(20, 86, 240, 0.22));
            border-radius: 12px 0 0 12px;
            pointer-events: none;
        }
        .slider-tip {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #94a3b8;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .slider-handle {
            position: absolute;
            left: 4px;
            top: 4px;
            width: 52px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
            cursor: grab;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-handle:active { cursor: grabbing; }
        .slider-handle svg {
            width: 18px;
            height: 18px;
            fill: #1456F0;
        }
        .verify-msg {
            min-height: 20px;
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: #ef4444;
        }
        .verify-msg.is-loading { color: #1456F0; }
        .verify-msg.is-success { color: #16a34a; }
        .click-panel {
            margin-top: 8px;
            padding: 8px 0 4px;
        }
        .click-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #1456F0 0%, #5b8cff 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(20, 86, 240, 0.28);
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .click-btn:active { transform: scale(0.98); }
        .click-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }
        .click-hint {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
